<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meeting Notes</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <div id="app">
    <!-- Pre-connect screen -->
    <div id="pre-connect" class="pre-connect">
      <div class="orb orb--idle"></div>
      <div class="pre-connect__info">
        <h1>Meeting Notes</h1>
        <p>AI meeting facilitator powered by AssemblyAI Universal-3 Pro</p>
      </div>
      <button id="start-btn" onclick="connect()">Start Meeting</button>
    </div>

    <!-- Meeting screen -->
    <div id="meeting" class="meeting hidden">
      <!-- Video grid -->
      <div class="video-grid">
        <div class="video-tile" id="user-tile">
          <video id="local-video" autoplay muted playsinline></video>
          <div class="video-tile__label">You</div>
          <div class="video-tile__placeholder hidden" id="user-placeholder">
            <span>You</span>
          </div>
        </div>
        <div class="video-tile" id="agent-tile">
          <div id="agent-orb" class="orb orb--small orb--idle"></div>
          <div class="video-tile__label">AI Facilitator</div>
        </div>
      </div>

      <!-- Caption bar -->
      <div class="caption-bar" id="caption-bar">
        <div class="caption-bar__text">
          <span class="caption-bar__speaker" id="caption-speaker"></span>
          <span id="caption-text">Waiting for speech...</span>
        </div>
      </div>

      <!-- Transcript panel -->
      <div class="transcript-panel scrollbar-thin" id="transcript-panel"></div>

      <!-- Control bar -->
      <div class="control-bar">
        <button class="control-btn control-btn--default" id="mic-btn" onclick="toggleMic()" title="Toggle microphone">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
            <line x1="12" y1="19" x2="12" y2="23"/>
            <line x1="8" y1="23" x2="16" y2="23"/>
          </svg>
        </button>
        <button class="control-btn control-btn--default" id="cam-btn" onclick="toggleCamera()" title="Toggle camera">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M23 7l-7 5 7 5V7z"/>
            <rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
          </svg>
        </button>
        <button class="control-btn control-btn--end" id="end-btn" onclick="endMeeting()">
          End Meeting
        </button>
        <span id="duration" class="duration"></span>
      </div>
    </div>

    <!-- Notes panel (shown after meeting ends) -->
    <div id="notes-panel" class="notes-panel hidden">
      <div class="notes-panel__header">
        <h2>Meeting Notes</h2>
        <button onclick="resetToStart()" class="notes-panel__back">New Meeting</button>
      </div>
      <div id="notes" class="notes-panel__body"></div>
    </div>
  </div>

  <audio id="remote-audio" autoplay></audio>
  <script src="app.js"></script>
</body>
</html>
